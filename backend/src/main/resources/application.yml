server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: search-tools
  
  # SQLite配置
  datasource:
    url: jdbc:sqlite:searchtools.db
    driver-class-name: org.sqlite.JDBC
  
  # JPA配置
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: false
  sql:
    init:
      mode: never

  # 邮件配置
  mail:
    host: smtp.163.com
    port: 465
    username: ${MAIL_USERNAME:jiegiser@163.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
  task:
    scheduling:
      pool:
        size: 5

# 搜索引擎配置
search:
  lucene:
    index-path: ./lucene-index
  
# 爬虫配置
crawler:
  # 线程池大小
  thread-pool-size: 10
  # 请求间隔(毫秒)
  request-interval: 1000
  # 连接超时(毫秒)
  connect-timeout: 10000
  # 读取超时(毫秒)
  read-timeout: 30000
  # User-Agent
  user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# 52pojie爬虫配置
pojie:
  # 登录用户名(通过环境变量或API设置)
  username: ${POJIE_USERNAME:}
  # 登录密码
  password: ${POJIE_PASSWORD:}
  # 关注的关键词
  keywords: Java,C++,前端,架构师,书,电子书,PDF,教程,Python,Go,Rust,JavaScript,TypeScript
  # 爬取间隔(毫秒) - 10分钟
  interval: 600000
  # 关注的板块ID(悬赏区等)
  forum-ids: 16,65,66,67
  # 每次爬取的页数
  pages: 3

# 通知配置
notification:
  email:
    # 收件人
    to: jiegiser@163.com
    # 发件人
    from: ${MAIL_USERNAME:jiegiser@163.com}

# 日志配置
logging:
  level:
    com.searchtools: DEBUG
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
